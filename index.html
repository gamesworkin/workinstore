<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal em Manutenção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mesh-gradient">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <main class="content-box">
        <div class="logo-wrapper">
            <img src="logo.png" alt="Sua Logo" onerror="this.style.display='none'">
        </div>
        <h1>Portal em Evolução</h1>
        <p>Estamos refinando a experiência. Novidades exclusivas em breve.</p>
        
        <div class="progress-track">
            <div class="progress-fill" id="pb"></div>
        </div>
        <span id="percent">0%</span>
    </main>

    <script src="script.js"></script>
</body>
</html>
