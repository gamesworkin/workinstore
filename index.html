<!DOCTYPE html> 
<html lang="pt-br">
<head>

    <title>Portal em Construção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="light-layer">
        <div class="blob b1"></div>

    <script src="script.js"></script>

</html>
