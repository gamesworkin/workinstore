<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workin’Store | Portal</title>
    <link rel="stylesheet" href="style.css">
	<link rel="icon" type="image/x-icon" href="fav.ico">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="bg-animated"></div>

    <header id="main-header">
        <div class="logo">Workin’Store</div>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <nav id="nav-links">
            <ul id="menu-items"></ul>
        </nav>
        <button id="btn-admin" class="btn-subtle">Acesso Restrito</button>
    </header>

    <main>
        <section id="servicos" class="servicos-grid"></section>

        <section id="admin-panel" class="hidden">
            <div class="admin-wrapper">
                <h2>Painel Administrativo</h2>
                
                <div class="admin-section">
                    <h3>Gestão de Cabeçalho</h3>
                    <input type="text" id="menu-nome" placeholder="Nome do Link">
                    <input type="text" id="menu-valor" placeholder="URL ou Conteúdo">
                    <input type="number" id="menu-ordem" placeholder="Ordem (ex: 1)">
                    <div class="radio-group">
                        <label><input type="radio" name="tipo" value="link" checked> Link Direto</label>
                        <label><input type="radio" name="tipo" value="modal"> Modal</label>
                    </div>
                    <button onclick="salvarMenu()" class="btn-neon">Salvar Link</button>
                    <ul id="lista-menu-admin" class="admin-list"></ul>
                </div>

                <div class="admin-section">
                    <h3>Gestão de Cards</h3>
                    <input type="text" id="card-titulo" placeholder="Título">
                    <input type="text" id="card-logo" placeholder="URL da Logo">
                    <input type="number" id="card-ordem" placeholder="Ordem">
                    <textarea id="card-desc" placeholder="Descrição"></textarea>
                    <input type="text" id="card-link" placeholder="Link do botão 'Saiba Mais'">
                    <button onclick="salvarCard()" class="btn-neon">Salvar Card</button>
                    <ul id="lista-cards-admin" class="admin-list"></ul>
                </div>

                <div class="admin-section">
                    <h3>Sistema</h3>
                    <button onclick="exportarDados()" class="btn-neon">Exportar JSON</button>
                    <button onclick="importarDados()" class="btn-neon">Importar JSON</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; Workin’Store 2026 - Todos os direitos reservados</p>
    </footer>

    <div id="modal-admin" class="modal">
        <div class="modal-content login-box">
            <span class="close-modal" onclick="document.getElementById('modal-admin').style.display='none'">&times;</span>
            <h3>Login Administrativo</h3>
            <div class="input-group">
                <input type="email" id="email-admin" placeholder="Email">
                <input type="password" id="password-admin" placeholder="Senha">
            </div>
            <button id="login-btn" class="btn-neon">Entrar</button>
        </div>
    </div>

    <div id="modal-generic" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="document.getElementById('modal-generic').style.display='none'">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

<script src="script.js"></script>
    		
	<a href="https://wa.me/5588988470190" target="_blank" class="whatsapp-float">
    		<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
		</a>
    
    <script src="script.js"></script>
</body>
</html>
