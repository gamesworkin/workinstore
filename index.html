    <title>Workin'Store | Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="event.preventDefault()" onkeydown="return !(event.ctrlKey && event.keyCode == 85)">

    <header id="main-header">
        <nav id="nav-menu">
            <!-- Renderizado via JS -->
        </nav>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
