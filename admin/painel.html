<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Painel</title><link rel="stylesheet" href="../style.css"></head>
<body>
    <div class="dynamic-background"></div>
    <main class="main-container">
        <h1>Painel de Controle</h1>
        <hr>
        <h3>Header</h3>
        <input id="h-title" placeholder="Título"> <input id="h-url" placeholder="URL">
        <button onclick="addHeader()">Adicionar Link</button>
        <h3>Serviços</h3>
        <input id="s-title" placeholder="Título"> <input id="s-desc" placeholder="Descrição"> <input id="s-url" placeholder="URL"> <input id="s-logo" placeholder="URL da Logo">
        <button onclick="addService()">Salvar Serviço</button>
        <hr style="margin:20px 0;">
        <button onclick="exportJSON()" style="background:#22c55e;">Exportar Backup</button>
        <button onclick="document.getElementById('import-file').click()" style="background:#f59e0b;">Importar Backup</button>
        <input type="file" id="import-file" style="display:none" onchange="importJSON(event)">
        <button onclick="logout()" style="background:#ef4444;">Sair</button>
    </main>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="admin-logic.js"></script>
</body></html>
