<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="dynamic-background"></div>
    <main class="main-container">
        <h1>Gerenciar Serviços</h1>
        <input type="text" id="title" placeholder="Título do Serviço">
        <input type="text" id="desc" placeholder="Descrição curta">
        <input type="text" id="url" placeholder="URL do Link">
        <button id="save-btn">Salvar Serviço</button>
        <button id="logout-btn" style="background: #e11d48;">Sair</button>
    </main>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="admin-logic.js"></script>
</body>
</html>
