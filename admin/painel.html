<main class="main-container">
    <h1>Painel de Controle</h1>
    <section>
        <h3>Gerenciar Header</h3>
        <input id="h-title" placeholder="Título"> <input id="h-url" placeholder="URL">
        <button onclick="addHeader()">Adicionar ao Header</button>
    </section>
    <section>
        <h3>Gerenciar Serviços</h3>
        <input id="s-title" placeholder="Nome"> <input id="s-desc" placeholder="Descrição"> <input id="s-url" placeholder="URL">
        <button onclick="addService()">Adicionar Serviço</button>
    </section>
    <section>
        <button onclick="exportJSON()" style="background:#22c55e;">Exportar JSON</button>
        <button onclick="logout()" style="background:#ef4444;">Sair</button>
    </section>
</main>
